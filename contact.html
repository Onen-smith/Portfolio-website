    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #ffffff; }
        
        /* Consistent Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .bg-noise { background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"); }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s ease;
        }
        .glass-input:focus { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.3); outline: none; }
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
    
    /* === IMPROVED AUTOFILL FIX (Glass Support) === */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        textarea:-webkit-autofill,
        textarea:-webkit-autofill:hover,
        textarea:-webkit-autofill:focus {
            /* 1. Force the text to be white */
            -webkit-text-fill-color: white !important;
            
            /* 2. The Time-Delay Trick: */
            /* This tells the browser to wait 600,000 seconds before */
            /* changing the background color to white/yellow. */
            /* This keeps your original glass transparency intact. */
            transition: background-color 600000s 0s, color 600000s 0s;
        }
    /* 1. GLOBAL RESET */
    body { font-family: 'Space Grotesk', sans-serif; background-color: #050505; color: #ffffff; overflow-x: hidden; }

    /* 2. HIDE DEFAULT CURSOR (The "Nuke" Option) */
    /* This forces the cursor to be hidden on EVERYTHING */
    * {
        cursor: none !important;
    }

    /* 3. CUSTOM CURSOR STYLES */
    #cursor-dot, #cursor-ring {
        position: fixed;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        pointer-events: none; /* Allows you to click through the custom cursor */
        z-index: 9999;
        mix-blend-mode: difference; /* Ensures visibility on light/dark backgrounds */
    }

    /* The Inner Dot */
    #cursor-dot {
        width: 8px;
        height: 8px;
        background-color: white;
    }

    /* The Outer Ring */
    #cursor-ring {
        width: 40px;
        height: 40px;
        border: 1px solid white;
        transition: width 0.2s, height 0.2s, background-color 0.2s;
    }

    /* Hover State (Ring Expands) */
    #cursor-ring.active {
        width: 60px;
        height: 60px;
        background-color: rgba(255, 255, 255, 0.2);
        border-color: transparent;
    }

    /* === PRELOADER CURTAIN === */
    #preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background-color: #050505; /* Matches your background */
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: transform 0.8s cubic-bezier(0.76, 0, 0.24, 1); /* Cinematic ease */
    }

    /* When the site is loaded, this class slides the curtain up */
    #preloader.loaded {
        transform: translateY(-100%);
    }

    /* Logo Animation */
    .preloader-logo {
        width: 80px; /* Larger version of logo */
        height: auto;
        margin-bottom: 20px;
        opacity: 0;
        animation: logoFade 1s ease forwards;
    }

    @keyframes logoFade {
        0% { opacity: 0; transform: scale(0.9); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* Keep your existing animations below... */
    @keyframes blob { 0% { transform: translate(0px, 0px) scale(1); } 33% { transform: translate(30px, -50px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.9); } 100% { transform: translate(0px, 0px) scale(1); } }
    .animate-blob { animation: blob 7s infinite; }
    .animate-scroll { animation: scroll 15s linear infinite; }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .bento-card { transition: all 0.1s ease; transform-style: preserve-3d; transform: perspective(1000px); backdrop-filter: blur(10px); }
    .content-float { transform: translateZ(30px); }
    </style>
</head>

    <script>
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    
    // 1. Move Cursor
    document.addEventListener('mousemove', (e) => {
        // Dot moves instantly
        dot.style.left = e.clientX + 'px';
        dot.style.top = e.clientY + 'px';
        
        // Ring moves instantly too (or you can add a slight delay logic here if preferred)
        // For "Dot inside Ring", keeping them synced is usually cleaner:
        ring.style.left = e.clientX + 'px';
        ring.style.top = e.clientY + 'px';
    });

    // 2. Add Hover Effect (Expand Ring)
    const hoverElements = document.querySelectorAll('a, button, .bento-card, .project-card, input, textarea');

    hoverElements.forEach(el => {
        el.addEventListener('mouseenter', () => {
            ring.classList.add('active'); // Ring gets bigger
        });
        el.addEventListener('mouseleave', () => {
            ring.classList.remove('active'); // Ring shrinks back
        });
    });

    // 3. Hide cursor when leaving the window (optional polish)
    document.addEventListener('mouseout', () => {
        dot.style.opacity = '0';
        ring.style.opacity = '0';
    });
    document.addEventListener('mouseover', () => {
        dot.style.opacity = '1';
        ring.style.opacity = '1';
    });

    /* === PRELOADER SCRIPT === */
    window.addEventListener("load", () => {
        const preloader = document.getElementById("preloader");
        
        // Small delay to ensure the animation plays at least once
        setTimeout(() => {
            preloader.classList.add("loaded");
            
            // Optional: Remove it from DOM completely after animation is done to save memory
            setTimeout(() => {
                preloader.style.display = 'none';
            }, 1000); 
        }, 500); // Waits 1.5 seconds before opening
    });
</script>
