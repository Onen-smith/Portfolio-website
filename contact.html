<script>
const openMenu = document.getElementById("openMenu");
const sidebar = document.getElementById("sidebarMenu");
const overlay = document.getElementById("overlay");

if (openMenu && sidebar && overlay) {
    openMenu.addEventListener("click", () => {
        sidebar.classList.add("active");
        overlay.classList.add("show");
    });

    overlay.addEventListener("click", () => {
        sidebar.classList.remove("active");
        overlay.classList.remove("show");
    });
    // auto-close sidebar when a sidebar link is clicked
    const sidebarLinks = document.querySelectorAll('.sidebar-links a');
    sidebarLinks.forEach(link => {
        link.addEventListener('click', () => {
            sidebar.classList.remove('active');
            overlay.classList.remove('show');
        });
    });
}
</script>

<!-- One-time hamburger hint: animate once for first-time visitors -->
<script>
    (function(){
        try {
            var key = 'menuHintShown_v1';
            if (!localStorage.getItem(key)) {
                var btn = document.getElementById('openMenu');
                if (btn) {
                    btn.classList.add('hint');
                    setTimeout(function(){
                        btn.classList.remove('hint');
                        try { localStorage.setItem(key, '1'); } catch(e){}
                    }, 1400);
                }
            }
        } catch(e) {}
    })();
</script>
<script>
let headerSlides = document.querySelectorAll('.header-slide');
let i = 0;

setInterval(() => {
    headerSlides[i].classList.remove('active');
    i = (i + 1) % headerSlides.length;
    headerSlides[i].classList.add('active');
}, 4000); // 4 seconds per slide
</script>
<script>
const menuToggle = document.getElementById("menu-toggle");
const navMenu = document.querySelector(".main-nav ul");
const navLinks = document.querySelectorAll(".main-nav ul li a");

// Toggle dropdown + animate hamburger
menuToggle.addEventListener("click", () => {
    navMenu.classList.toggle("show");
    menuToggle.classList.toggle("active");
});

// Auto-close when clicking a menu item
navLinks.forEach(link => {
    link.addEventListener("click", () => {
        navMenu.classList.remove("show");
        menuToggle.classList.remove("active");
    });
});
</script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const elements = document.querySelectorAll(".reveal");

    const revealOnScroll = () => {
        elements.forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight - 80) {
                el.classList.add("visible");
            }
        });
    };

    revealOnScroll();
    window.addEventListener("scroll", revealOnScroll);
});
</script>
